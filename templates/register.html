{% extends "base.html" %}

{% block auth_content %}
<div class="auth-card glass-panel">
    <h1>Create Account</h1>
    <p>Start matching candidates intelligently.</p>

    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="username">Company / User Name</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Tech Corp">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@company.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Sign Up <i class="fa-solid fa-user-plus"></i></button>
    </form>

    <div class="auth-links">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a></p>
    </div>
</div>
{% endblock %}
