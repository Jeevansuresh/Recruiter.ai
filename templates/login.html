{% extends "base.html" %}

{% block auth_content %}
<div class="auth-card glass-panel">
    <h1>Welcome Back</h1>
    <p>Sign in to your AI Matches Dashboard.</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required autofocus placeholder="name@company.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Sign In <i class="fa-solid fa-arrow-right"></i></button>
    </form>

    <div class="auth-links">
        <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
    </div>
</div>
{% endblock %}
