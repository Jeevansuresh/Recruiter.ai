{% extends "base.html" %}
{% block content %}
<div class="job-header animate-enter" style="margin-bottom: 2.5rem;">
    <h1 class="page-title" style="margin-bottom: 0.5rem; color: var(--text-main); font-size: 2.2rem;">AI Outreach</h1>
    <p style="color: var(--text-muted); font-size: 1rem; margin: 0;"><i class="fa-solid fa-envelope-open-text"></i>
        Automate personalized candidate emails</p>
</div>

<div class="animate-enter animate-delay-1"
    style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start;">
    <!-- Selector Panel -->
    <div class="glass-panel" style="padding: 2rem;">
        <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--text-main);"><i class="fa-solid fa-address-book"
                style="color: var(--accent);"></i> Select Candidate</h3>
        <form method="POST">
            <div class="form-group">
                <label>Candidate Profile</label>
                <select name="candidate_id" class="form-control"
                    style="width: 100%; padding: 0.85rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.2); color: var(--text-main); font-family: inherit; margin-bottom: 1.5rem; outline: none;"
                    required>
                    <option value="" disabled selected>Select a mapped candidate...</option>
                    {% for c in candidates %}
                    {% set cand_name = c.ai_analysis.get('candidate_name', '') if c.ai_analysis else '' %}
                    {% set display_name = cand_name if cand_name and cand_name.strip() and cand_name.lower() !=
                    'unknown' else c.filename %}
                    <option value="{{ c.id }}" {% if selected and selected.id==c.id %}selected{% endif %}>{{
                        display_name }} - {{ c.job.title }} ({{ c.status }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="display: flex; gap: 1rem;">
                <button type="submit" name="action_type" value="Interview Invitation" class="btn"
                    style="flex: 1; background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3);"><i
                        class="fa-solid fa-calendar-check"></i> Generate Invite</button>
                <button type="submit" name="action_type" value="Polite Rejection" class="btn"
                    style="flex: 1; background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3);"><i
                        class="fa-solid fa-hand-paper"></i> Generate Rejection</button>
            </div>
        </form>
    </div>

    <!-- AI Output Panel -->
    <div class="glass-panel" style="padding: 2rem; min-height: 400px; display: flex; flex-direction: column;">
        <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--text-main);"><i class="fa-solid fa-robot"
                style="color: var(--accent);"></i> AI Drafted Email</h3>
        {% if draft %}
        <div
            style="flex: 1; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 1.5rem; border: 1px solid var(--glass-border);">
            <p
                style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px;">
                Draft for {{ selected.filename }}</p>
            <textarea
                style="width: 100%; height: 280px; background: transparent; border: none; color: var(--text-main); font-size: 1rem; line-height: 1.6; resize: none; outline: none; font-family: inherit;">{{ draft }}</textarea>
        </div>
        <button class="btn btn-primary" style="margin-top: 1.5rem;"
            onclick="navigator.clipboard.writeText(document.querySelector('textarea').value); alert('Copied to clipboard!')"><i
                class="fa-solid fa-copy"></i> Copy to Clipboard</button>
        {% else %}
        <div
            style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5;">
            <i class="fa-solid fa-envelope-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <p>Select a candidate to generate a context-aware email</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
