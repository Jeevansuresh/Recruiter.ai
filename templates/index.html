{% extends "base.html" %}

{% block auth_content %}
<div class="auth-card glass-panel" style="max-width: 650px; text-align: center; padding: 4rem 3rem;">
  <div style="font-size: 3rem; color: var(--accent); margin-bottom: 1rem;"><i
      class="fa-solid fa-magnifying-glass-chart"></i></div>
  <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Recruiter AI</h1>
  <p style="font-size: 1.15rem; margin-bottom: 2.5rem; line-height: 1.6;">The next-generation applicant tracking system
    powered by Large Language Models. Match thousands of resumes instantly with precision intelligence.</p>

  <div style="display: flex; gap: 1rem; justify-content: center;">
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary"
      style="width: auto; padding: 1rem 2rem; font-size: 1.1rem;">Log In to Dashboard</a>
    <a href="{{ url_for('auth.register') }}" class="btn"
      style="width: auto; padding: 1rem 2rem; font-size: 1.1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white;">Create
      Free Account</a>
  </div>
</div>
{% endblock %}
